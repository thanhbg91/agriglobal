<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi App Test</title>
    <!-- Nhúng thư viện Pi SDK chính thức -->
    <script src="https://minepi.com"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h1>Ứng dụng Pi AgriGlobal</h1>
        <button id="login-btn" style="padding: 12px 24px; background-color: #6200ee; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold;">
            Đăng nhập bằng Pi
        </button>
        <p id="user-info" style="margin-top: 20px; font-weight: bold; color: green; font-size: 18px;"></p>
        <p id="error-info" style="margin-top: 20px; color: red; font-size: 14px;"></p>
    </div>

    <script>
        function showLog(message, isError = false) {
            const target = isError ? document.getElementById('error-info') : document.getElementById('user-info');
            target.innerText = message;
        }

        // Khởi tạo Pi SDK cơ bản cho môi trường Testnet Sandbox
        try {
            Pi.init({ 
                version: "2.0", 
                sandbox: true 
            });
            console.log("Pi SDK đã khởi tạo.");
        } catch (e) {
            showLog("Lỗi khởi tạo: " + e.message, true);
        }

        // Xử lý sự kiện bấm nút Đăng nhập
        document.getElementById('login-btn').addEventListener('click', function() {
            showLog("Đang kết nối với Pi Network...");
            
            const scopes = ['username', 'payments'];
            
            function onIncompletePaymentFound(payment) {
                console.log("Giao dịch chưa hoàn thành:", payment);
            }

            Pi.authenticate(scopes, onIncompletePaymentFound)
                .then(function(auth) {
                    // Đăng nhập thành công, hiển thị tên người dùng
                    showLog("Xin chào Pioneer: " + auth.user.username);
                    document.getElementById('error-info').innerText = ""; 
                })
                .catch(function(error) {
                    // Hiển thị chi tiết lỗi trực tiếp lên màn hình điện thoại
                    showLog("Đăng nhập thất bại: " + JSON.stringify(error), true);
                });
        });
    </script>
</body>
</html>
