name: Android CI/CD Build APK

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Cho phép kích hoạt thủ công từ giao diện GitHub Actions

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Set up Debug Keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            echo "Decoding debug.keystore from GitHub Secrets..."
            echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > debug.keystore
          elif [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore from local debug.keystore.base64 file..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No keystore found. Generating a new debug.keystore automatically..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Create .env file from .env.example
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Build Debug APK with Gradle
        run: ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgriGlobal-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
